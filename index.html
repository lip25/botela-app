<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOTELA SUPER MANAGER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
    text-align: center;
}
h1 { color: #22c55e; }
.container { max-width: 430px; margin: auto; }
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
}
.product-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
}
.product-name {
    font-size: 18px;
    font-weight: 600;
    width: 110px;
    text-align: left;
}
.qty-box {
    font-size: 20px;
    padding: 5px 15px;
    background: #0f172a;
    border-radius: 8px;
    min-width: 45px;
}
.btn {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
.btn-danger { background: #c0392b; }
.btn-full { width: 100%; margin-top: 10px; }
canvas { margin-top: 15px; }
</style>
</head>

<body>

<h1>BOTELA MANAGER</h1>
<p>Versi Final HPP Akurat</p>

<div class="container">

<div class="card">
<h3>Produk Terjual</h3>

<div class="product-row">
<div class="product-name">AMERICANO</div>
<button class="btn" onclick="kurang('americano')">−</button>
<div id="qty-americano" class="qty-box">0</div>
<button class="btn" onclick="tambah('americano')">+</button>
</div>

<div class="product-row">
<div class="product-name">KOPI SUSU</div>
<button class="btn" onclick="kurang('kopisusu')">−</button>
<div id="qty-kopisusu" class="qty-box">0</div>
<button class="btn" onclick="tambah('kopisusu')">+</button>
</div>

<div class="product-row">
<div class="product-name">MATCHA</div>
<button class="btn" onclick="kurang('matcha')">−</button>
<div id="qty-matcha" class="qty-box">0</div>
<button class="btn" onclick="tambah('matcha')">+</button>
</div>

</div>

<button class="btn btn-full" onclick="laporan()">Lihat Laporan</button>
<button class="btn btn-full" onclick="showDashboard()">Dashboard Omzet Harian</button>
<button class="btn btn-danger btn-full" onclick="resetData()">Reset Data</button>

<canvas id="chartOmzet" style="display:none;"></canvas>

</div>

<script>
// =============================
// DATABASE
// =============================
let penjualan = JSON.parse(localStorage.getItem("penjualan")) || {
    americano: 0,
    kopisusu: 0,
    matcha: 0
};

let riwayat = JSON.parse(localStorage.getItem("riwayat")) || [];

// =============================
// HARGA JUAL
// =============================
const HARGA_JUAL = {
    americano: 12000,
    kopisusu: 15000,
    matcha: 15000
};

// =============================
// HPP FINAL (SUDAH TERMASUK AIR)
// =============================
const HPP = {
    americano: 3000,
    kopisusu: 7900,
    matcha: 6100
};

// =============================
// UPDATE UI
// =============================
function refreshUI() {
    document.getElementById("qty-americano").innerText = penjualan.americano;
    document.getElementById("qty-kopisusu").innerText = penjualan.kopisusu;
    document.getElementById("qty-matcha").innerText = penjualan.matcha;
}
refreshUI();

// =============================
// BUTTON CONTROL
// =============================
function tambah(p) {
    penjualan[p]++;
    save();
}
function kurang(p) {
    if (penjualan[p] > 0) penjualan[p]--;
    save();
}
function save() {
    localStorage.setItem("penjualan", JSON.stringify(penjualan));
    refreshUI();
}

// =============================
// LAPORAN
// =============================
function laporan() {
    let totalOmzet = 0;
    let totalModal = 0;
    let text = "";

    for (let p in penjualan) {
        let qty = penjualan[p];
        let omzet = qty * HARGA_JUAL[p];
        let modal = qty * HPP[p];
        let profit = omzet - modal;

        totalOmzet += omzet;
        totalModal += modal;

        text += `\n${p.toUpperCase()}:\n`;
        text += `Terjual: ${qty}\n`;
        text += `Omzet : Rp${omzet.toLocaleString()}\n`;
        text += `Modal : Rp${modal.toLocaleString()}\n`;
        text += `Profit: Rp${profit.toLocaleString()}\n\n`;
    }

    let totalProfit = totalOmzet - totalModal;
    let pribadi = Math.floor(totalProfit * 0.30);
    let modalPutar = totalProfit - pribadi;

    text += "====== TOTAL ======\n";
    text += `Total Omzet : Rp${totalOmzet.toLocaleString()}\n`;
    text += `Total Modal : Rp${totalModal.toLocaleString()}\n`;
    text += `Total Profit: Rp${totalProfit.toLocaleString()}\n\n`;

    text += "====== PEMBAGIAN ======\n";
    text += `Modal (70%): Rp${modalPutar.toLocaleString()}\n`;
    text += `Pribadi (30%): Rp${pribadi.toLocaleString()}\n`;

    if (totalOmzet > 0) {
        let today = new Date();
        let tgl = today.getDate() + "/" + (today.getMonth()+1);
        riwayat.push({tgl: tgl, omzet: totalOmzet});
        localStorage.setItem("riwayat", JSON.stringify(riwayat));
    }

    alert(text);
}

// =============================
// RESET
// =============================
function resetData() {
    if (!confirm("Reset semua data?")) return;

    penjualan = { americano:0, kopisusu:0, matcha:0 };
    riwayat = [];

    localStorage.setItem("penjualan", JSON.stringify(penjualan));
    localStorage.setItem("riwayat", JSON.stringify(riwayat));

    refreshUI();
    alert("Data berhasil direset!");
}

// =============================
// DASHBOARD
// =============================
function showDashboard() {

    if (riwayat.length === 0) {
        alert("Belum ada data omzet.");
        return;
    }

    const tgl = riwayat.map(x => x.tgl);
    const omzet = riwayat.map(x => x.omzet);

    document.getElementById("chartOmzet").style.display = "block";

    new Chart(document.getElementById("chartOmzet"), {
        type: 'line',
        data: {
            labels: tgl,
            datasets: [{
                label: 'Omzet Harian',
                data: omzet,
                borderWidth: 3
            }]
        }
    });
}
</script>

</body>
</html>
