<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BOTELA MANAGER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

.card {
    background: #1c1c1e;
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 12px;
}

.product {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
}

.name {
    font-weight: 600;
}

.controls {
    display: flex;
    align-items: center;
    gap: 10px;
}

.qty {
    min-width: 30px;
    text-align: center;
    font-size: 18px;
}

button {
    border: none;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 18px;
    background: #2c2c2e;
    color: white;
}

button:active {
    opacity: 0.7;
}

.primary {
    background: #0a84ff;
}

.danger {
    background: #ff3b30;
}

.full {
    width: 100%;
    margin-top: 10px;
}

.result {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>BOTELA MANAGER</h1>

<div class="container">

<div class="card">

<div class="product">
<div class="name">Americano</div>
<div class="controls">
<button onclick="kurang('americano')">−</button>
<div id="americano" class="qty">0</div>
<button onclick="tambah('americano')">+</button>
</div>
</div>

<div class="product">
<div class="name">Kopi Susu</div>
<div class="controls">
<button onclick="kurang('kopisusu')">−</button>
<div id="kopisusu" class="qty">0</div>
<button onclick="tambah('kopisusu')">+</button>
</div>
</div>

<div class="product">
<div class="name">Matcha</div>
<div class="controls">
<button onclick="kurang('matcha')">−</button>
<div id="matcha" class="qty">0</div>
<button onclick="tambah('matcha')">+</button>
</div>
</div>

</div>

<div class="card result" id="hasil">
Belum ada transaksi
</div>

<button class="primary full" onclick="hitung()">Hitung</button>
<button class="danger full" onclick="reset()">Reset</button>

</div>

<script>
// DATA
let data = JSON.parse(localStorage.getItem("data")) || {
    americano: 0,
    kopisusu: 0,
    matcha: 0
};

// HARGA
const HARGA = {
    americano: 12000,
    kopisusu: 15000,
    matcha: 15000
};

// HPP FINAL
const HPP = {
    americano: 3000,
    kopisusu: 7900,
    matcha: 6100
};

// UPDATE UI
function updateUI() {
    document.getElementById("americano").innerText = data.americano;
    document.getElementById("kopisusu").innerText = data.kopisusu;
    document.getElementById("matcha").innerText = data.matcha;
}
updateUI();

// BUTTON
function tambah(p) {
    data[p]++;
    save();
}
function kurang(p) {
    if (data[p] > 0) data[p]--;
    save();
}
function save() {
    localStorage.setItem("data", JSON.stringify(data));
    updateUI();
}

// HITUNG
function hitung() {
    let omzet = 0;
    let modal = 0;
    let text = "";

    for (let p in data) {
        let qty = data[p];
        let o = qty * HARGA[p];
        let m = qty * HPP[p];
        let profit = o - m;

        omzet += o;
        modal += m;

        text += `${p.toUpperCase()}
Qty: ${qty}
Omzet: Rp${o.toLocaleString()}
Modal: Rp${m.toLocaleString()}
Profit: Rp${profit.toLocaleString()}

`;
    }

    let totalProfit = omzet - modal;

    text += `TOTAL OMZET: Rp${omzet.toLocaleString()}
TOTAL MODAL: Rp${modal.toLocaleString()}
TOTAL PROFIT: Rp${totalProfit.toLocaleString()}

MODAL WAJIB DISIMPAN:
Rp${modal.toLocaleString()}
`;

    document.getElementById("hasil").innerText = text;
}

// RESET
function reset() {
    if (!confirm("Reset data?")) return;
    data = {americano:0,kopisusu:0,matcha:0};
    save();
    document.getElementById("hasil").innerText = "Data direset";
}
</script>

</body>
</html>
