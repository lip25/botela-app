<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BOTELA MANAGER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 420px;
    margin: auto;
}

.card {
    background: #1c1c1e;
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 12px;
}

.product {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 12px 0;
}

.name {
    font-weight: 600;
}

.controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

.qty {
    min-width: 30px;
    text-align: center;
    font-size: 18px;
}

button {
    border: none;
    border-radius: 10px;
    padding: 6px 12px;
    background: #2c2c2e;
    color: white;
    font-size: 18px;
}

button:active {
    opacity: 0.7;
}

.primary {
    background: #0a84ff;
}

.danger {
    background: #ff3b30;
}

.full {
    width: 100%;
    margin-top: 10px;
}

.result {
    white-space: pre-line;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>BOTELA MANAGER</h1>

<div class="container">

<div class="card">

<div class="product">
<div class="name">Americano</div>
<div class="controls">
<button onclick="kurang('americano')">−</button>
<div id="americano" class="qty">0</div>
<button onclick="tambah('americano')">+</button>
</div>
</div>

<div class="product">
<div class="name">Kopi Susu</div>
<div class="controls">
<button onclick="kurang('kopisusu')">−</button>
<div id="kopisusu" class="qty">0</div>
<button onclick="tambah('kopisusu')">+</button>
</div>
</div>

<div class="product">
<div class="name">Matcha</div>
<div class="controls">
<button onclick="kurang('matcha')">−</button>
<div id="matcha" class="qty">0</div>
<button onclick="tambah('matcha')">+</button>
</div>
</div>

</div>

<div class="card result" id="hasil">
Belum ada transaksi
</div>

<button class="primary full" onclick="hitung()">Hitung</button>
<button class="danger full" onclick="reset()">Reset</button>

</div>

<script>

// ================= DATA =================
let data = JSON.parse(localStorage.getItem("data")) || {
    americano: 0,
    kopisusu: 0,
    matcha: 0
};

// ================= HARGA =================
const HARGA = {
    americano: 12000,
    kopisusu: 15000,
    matcha: 15000
};

// ================= HPP ASLI =================
const HPP = {
    americano: 3000,
    kopisusu: 7900,
    matcha: 6100
};

// ================= MODAL AMAN (HPP +15%) =================
const MODAL = {
    americano: 3500,
    kopisusu: 9100,
    matcha: 7100
};

// ================= UI =================
function updateUI() {
    document.getElementById("americano").innerText = data.americano;
    document.getElementById("kopisusu").innerText = data.kopisusu;
    document.getElementById("matcha").innerText = data.matcha;
}
updateUI();

// ================= CONTROL =================
function tambah(p) {
    data[p]++;
    save();
}
function kurang(p) {
    if (data[p] > 0) data[p]--;
    save();
}
function save() {
    localStorage.setItem("data", JSON.stringify(data));
    updateUI();
}

// ================= HITUNG =================
function hitung() {
    let omzet = 0;
    let modal = 0;
    let profit = 0;

    let text = "";

    for (let p in data) {
        let qty = data[p];

        let o = qty * HARGA[p];
        let m = qty * MODAL[p];
        let hpp = qty * HPP[p];
        let pft = o - hpp;

        omzet += o;
        modal += m;
        profit += pft;

        text += `${p.toUpperCase()}
Qty: ${qty}
Omzet: Rp${o.toLocaleString()}
Modal Aman: Rp${m.toLocaleString()}
Profit Real: Rp${pft.toLocaleString()}

`;
    }

    text += `TOTAL OMZET: Rp${omzet.toLocaleString()}
MODAL WAJIB DISIMPAN: Rp${modal.toLocaleString()}
PROFIT BERSIH: Rp${profit.toLocaleString()}
`;

    document.getElementById("hasil").innerText = text;
}

// ================= RESET =================
function reset() {
    if (!confirm("Reset data?")) return;

    data = {americano:0,kopisusu:0,matcha:0};
    save();

    document.getElementById("hasil").innerText = "Data direset";
}

</script>

</body>
</html>
